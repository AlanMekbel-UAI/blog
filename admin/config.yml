backend:
  name: git-gateway
  branch: main

media_folder: "images" # Donde se guardarán tus fotos
public_folder: "/images"

collections:
  - name: "blog"
    label: "Notas del Blog"
    folder: "posts" # Donde se guardarán tus textos
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Fecha y Hora", name: "date", widget: "datetime", format: "YYYY-MM-DD HH:mm", default: ""}
      - {label: "Imagen de Portada", name: "image", widget: "image"}
      - {label: "Cuerpo de la nota", name: "body", widget: "markdown"}
