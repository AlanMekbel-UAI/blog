<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alan Mekbel · Blog</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A84C; --gold-light: #E8CC84; --gold-dark: #8B6914;
            --garnet-mid: #5C1422; --black: #080808; 
            --dark: #111012; --dark-2: #18161A; --white: #F8F6F2; 
            --off-white: #EDE9E0; --text-muted: #8A8590; --border: rgba(201,168,76,0.18);
        }
        body { background-color: var(--black); color: var(--white); font-family: 'Montserrat', sans-serif; margin: 0; }
        .container { max-width: 650px; margin: 0 auto; padding: 40px 20px; min-height: 100vh; }
        .hidden { display: none !important; }
        
        /* Linktree */
        .link-card {
            display: block; background: var(--dark-2); border: 1px solid var(--border);
            padding: 20px; margin-bottom: 15px; text-align: center;
            text-decoration: none; color: var(--off-white); transition: 0.3s;
            cursor: pointer; letter-spacing: 2px; font-size: 0.8rem;
        }
        .link-card:hover { background: #3D0B15; border-color: var(--gold); transform: translateY(-2px); }

        /* Notas del Blog */
        .note-entry { margin-bottom: 60px; border-bottom: 1px solid var(--border); padding-bottom: 40px; animation: fadeIn 0.8s ease; }
        .note-image { width: 100%; height: 350px; object-fit: cover; border: 1px solid var(--border); margin-bottom: 25px; filter: grayscale(20%); }
        .note-title { font-family: 'Cormorant Garamond', serif; font-size: 2.3rem; color: var(--gold-light); margin-bottom: 15px; line-height: 1.2; }
        .note-text { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; color: var(--off-white); line-height: 1.8; white-space: pre-wrap; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <div id="home">
            <h1 style="font-family: 'Cormorant Garamond'; text-align: center; font-size: 3.2rem; color: var(--gold); margin-bottom: 5px;">Alan Mekbel</h1>
            <p style="text-align: center; font-weight: 200; color: var(--text-muted); margin-bottom: 40px; letter-spacing: 3px; font-size: 0.75rem;">ARCHIVO PERSONAL & REDES</p>
            
            <div class="links-container" style="display: flex; flex-direction: column; gap: 5px;">
                <a class="link-card" onclick="toggleView('blog')" style="background: var(--garnet-mid); border-color: var(--gold-dark); font-weight: 600;">ENTRAR AL BLOG</a>
                
                <a href="https://instagram.com/agranate" target="_blank" class="link-card">INSTAGRAM</a>
                <a href="https://x.com/AlanMekbel14" target="_blank" class="link-card">X (PRINCIPAL)</a>
                <a href="https://x.com/MekbelAlan" target="_blank" class="link-card">X (GENERAL)</a>
                <a href="mailto:alanmekbeluai@gmail.com" class="link-card" style="opacity: 0.6; font-size: 0.7rem; border: none; background: transparent;">CONTACTO: alanmekbeluai@gmail.com</a>
            </div>
        </div>

        <div id="blog" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">
                <a onclick="toggleView('home')" style="color: var(--gold); cursor: pointer; font-size: 0.8rem; letter-spacing: 1px; text-decoration: none;">← VOLVER</a>
                <h2 style="font-family: 'Cormorant Garamond'; font-size: 1.4rem; letter-spacing: 3px; color: var(--white); margin: 0;">BITÁCORA</h2>
            </div>
            
            <div id="feed">
                <p style="text-align: center; opacity: 0.5; font-family: 'Cormorant Garamond'; font-style: italic;">Consultando el archivo...</p>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE TU REPOSITORIO
        const GITHUB_USER = "TU_USUARIO_DE_GITHUB"; 
        const GITHUB_REPO = "EL_NOMBRE_DE_TU_REPOSITORIO";

        function toggleView(view) {
            document.getElementById('home').classList.toggle('hidden', view === 'blog');
            document.getElementById('blog').classList.toggle('hidden', view === 'home');
            window.scrollTo(0,0);
            if(view === 'blog') {
                fetchNotes();
            }
        }

        async function fetchNotes() {
            const feed = document.getElementById('feed');
            
            try {
                // Obtenemos la lista de archivos en la carpeta /posts
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/posts`);
                const files = await response.json();
                
                if(!files || files.length === 0 || response.status === 404) {
                    feed.innerHTML = `
                        <div style="text-align: center; margin-top: 50px; opacity: 0.5;">
                            <p style="font-family: 'Cormorant Garamond'; font-style: italic; font-size: 1.2rem;">
                                El archivo está siendo organizado. Pronto habrá nuevas entradas...
                            </p>
                        </div>
                    `;
                    return;
                }

                feed.innerHTML = ""; // Limpiar mensaje de carga

                // Recorremos los archivos para extraer el contenido
                for (let file of files.reverse()) { 
                    const res = await fetch(file.download_url);
                    const content = await res.text();
                    
                    // Extraer metadatos (Título e Imagen) del archivo Markdown
                    const titleMatch = content.match(/title:\s*["']?(.*?)["']?(\r?\n|$)/);
                    const imageMatch = content.match(/image:\s*["']?(.*?)["']?(\r?\n|$)/);
                    
                    const title = titleMatch ? titleMatch[1] : "Sin título";
                    const img = imageMatch ? imageMatch[1] : "";
                    
                    // Extraer el cuerpo (después de los segundos ---)
                    const bodyParts = content.split('---');
                    const body = bodyParts.length > 2 ? bodyParts[2].trim() : content;

                    feed.innerHTML += `
                        <article class="note-entry">
                            ${img ? `<img src="${img}" class="note-image" onerror="this.style.display='none'">` : ''}
                            <h3 class="note-title">${title}</h3>
                            <div class="note-text">${body}</div>
                        </article>
                    `;
                }
            } catch (error) {
                console.error(error);
                feed.innerHTML = "<p style='text-align:center; opacity:0.5;'>Error al cargar el archivo. Revisa la configuración de GitHub.</p>";
            }
        }

        // Si existe un usuario logueado en Netlify Identity, cerrar modal automáticamente
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
</body>
</html>
