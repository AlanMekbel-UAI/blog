<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alan Mekbel · Blog</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A84C; --gold-light: #E8CC84; --black: #080808; 
            --dark: #111012; --dark-2: #18161A; --white: #F8F6F2; 
            --off-white: #EDE9E0; --text-muted: #8A8590; --border: rgba(201,168,76,0.18);
        }
        body { background-color: var(--black); color: var(--white); font-family: 'Montserrat', sans-serif; margin: 0; }
        .container { max-width: 650px; margin: 0 auto; padding: 40px 20px; }
        .hidden { display: none; }
        
        /* Estilo Linktree */
        .link-card {
            display: block; background: var(--dark-2); border: 1px solid var(--border);
            padding: 20px; margin-bottom: 15px; text-align: center;
            text-decoration: none; color: var(--off-white); transition: 0.3s;
            cursor: pointer; letter-spacing: 2px; font-size: 0.8rem;
        }
        .link-card:hover { background: #3D0B15; border-color: var(--gold); }

        /* Estilo Notas */
        .note-entry { margin-bottom: 60px; border-bottom: 1px solid var(--border); padding-bottom: 40px; }
        .note-image { width: 100%; height: 350px; object-fit: cover; border: 1px solid var(--border); margin-bottom: 20px; }
        .note-title { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; color: var(--gold-light); margin-bottom: 10px; }
        .note-text { font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; color: var(--off-white); line-height: 1.8; }
    </style>
</head>
<body>

    <div class="container">
        <div id="home">
    <h1 style="font-family: 'Cormorant Garamond'; text-align: center; font-size: 3rem; color: var(--gold); margin-bottom: 5px;">Alan Mekbel</h1>
    <p style="text-align: center; font-weight: 200; color: var(--text-muted); margin-bottom: 40px; letter-spacing: 3px; font-size: 0.7rem;">ARCHIVO PERSONAL & REDES</p>
    
        <div class="links-container" style="display: flex; flex-direction: column; gap: 10px;">
        <a class="link-card" onclick="toggleView('blog')" style="background: var(--garnet-mid); border-color: var(--gold-dark);">ENTRAR AL BLOG</a>
        
        <a href="https://instagram.com/agranate" target="_blank" class="link-card">INSTAGRAM</a>
        
        <a href="https://x.com/AlanMekbel14" target="_blank" class="link-card">X (PRINCIPAL)</a>
        
        <a href="https://x.com/MekbelAlan" target="_blank" class="link-card">X (GENERAL)</a>

        <a href="mailto:alanmekbeluai@gmail.com" class="link-card" style="opacity: 0.7; font-size: 0.7rem;">CONTACTO</a>
    </div>
</div>

    <script>
    function toggleView(view) {
        document.getElementById('home').classList.toggle('hidden', view === 'blog');
        document.getElementById('blog').classList.toggle('hidden', view === 'home');
        window.scrollTo(0,0);
        if(view === 'blog') {
            renderCMSNotes();
        }
    }

    async function renderCMSNotes() {
        const feed = document.getElementById('feed');
        
        // Mientras no tengas notas, mostraremos este mensaje estético
        feed.innerHTML = `
            <div style="text-align: center; margin-top: 50px; opacity: 0.5;">
                <p style="font-family: 'Cormorant Garamond'; font-style: italic; font-size: 1.2rem;">
                    El archivo está siendo organizado. Pronto habrá nuevas entradas...
                </p>
            </div>
        `;

        // Aquí es donde en el futuro podrías conectar la lectura automática
        // Por ahora, al publicar tu primera nota desde el /admin, 
        // ya tendrás contenido real para mostrar.
    }
</script>
</body>
</html>
