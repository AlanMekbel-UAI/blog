<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alan Mekbel · Blog</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A84C; --gold-light: #E8CC84; --gold-dark: #8B6914;
            --garnet-mid: #5C1422; --black: #080808; 
            --dark: #111012; --dark-2: #18161A; --white: #F8F6F2; 
            --off-white: #EDE9E0; --text-muted: #8A8590; --border: rgba(201,168,76,0.18);
        }
        body { background-color: var(--black); color: var(--white); font-family: 'Montserrat', sans-serif; margin: 0; }
        .container { max-width: 650px; margin: 0 auto; padding: 40px 20px; min-height: 100vh; }
        .hidden { display: none !important; }
        
        /* Links */
        .link-card {
            display: block; background: var(--dark-2); border: 1px solid var(--border);
            padding: 20px; margin-bottom: 15px; text-align: center;
            text-decoration: none; color: var(--off-white); transition: 0.3s;
            cursor: pointer; letter-spacing: 2px; font-size: 0.8rem;
        }
        .link-card:hover { background: #3D0B15; border-color: var(--gold); }

        /* Preview del Feed */
        .preview-card { 
            display: flex !important;
            flex-direction: column !important;
            margin-bottom: 40px; cursor: pointer; border-bottom: 1px solid var(--border); 
            padding-bottom: 20px; transition: 0.3s;
            width: 100% !important;
            box-sizing: border-box !important;
        }
        .preview-card:hover .note-title { color: var(--gold); }
        .preview-img { width: 100%; height: 200px; object-fit: cover; filter: grayscale(30%); margin-bottom: 15px; }

        /* Nota Individual y Títulos del Feed */
        .note-title { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 2.2rem; 
            color: var(--gold-light); 
            margin-bottom: 10px; 
            line-height: 1.3 !important; 
            
            /* Reset absoluto de cajas contenedoras */
            white-space: normal !important;
            word-wrap: break-word !important;
            overflow-wrap: break-word !important;
            word-break: normal !important;
            overflow: visible !important;
            max-width: 100% !important;
            display: block !important;
            height: auto !important;
            text-overflow: clip !important;
        }
        .note-text { font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; color: var(--off-white); line-height: 1.8; white-space: pre-wrap; }
        
        .btn-back { color: var(--gold); cursor: pointer; font-size: 0.8rem; letter-spacing: 1px; text-decoration: none; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="home">
            <h1 style="font-family: 'Cormorant Garamond'; text-align: center; font-size: 3.2rem; color: var(--gold); margin-bottom: 5px;">Alan Mekbel</h1>
            <p style="text-align: center; font-weight: 200; color: var(--text-muted); margin-bottom: 40px; letter-spacing: 3px; font-size: 0.75rem;">ARCHIVO PERSONAL & REDES</p>
            
            <div class="links-container">
                <a class="link-card" onclick="openBlog()" style="background: var(--garnet-mid); border-color: var(--gold-dark); font-weight: 600;">ENTRAR AL BLOG</a>
                <a href="https://instagram.com/agranate" target="_blank" class="link-card">INSTAGRAM</a>
                <a href="https://x.com/AlanMekbel14" target="_blank" class="link-card">X (PRINCIPAL)</a>
                <a href="https://x.com/MekbelAlan" target="_blank" class="link-card">X (GENERAL)</a>
                <a href="mailto:alanmekbeluai@gmail.com" class="link-card" style="opacity: 0.6; font-size: 0.7rem;">CONTACTO</a>
            </div>
        </div>

        <div id="blog" class="hidden">
            <div id="blog-content">
                </div>
        </div>
    </div>

    <script>
        const GITHUB_USER = "AlanMekbel-UAI"; 
        const GITHUB_REPO = "blog";

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if (params.has('post')) {
                openBlog(params.get('post'));
            }
        };

        function openBlog(slug = null) {
            document.getElementById('home').classList.add('hidden');
            document.getElementById('blog').classList.remove('hidden');
            if (slug) {
                renderFullNote(slug);
            } else {
                renderFeed();
            }
        }

        function goHome() {
            window.history.pushState({}, '', window.location.pathname);
            document.getElementById('home').classList.remove('hidden');
            document.getElementById('blog').classList.add('hidden');
        }

        // Extractor avanzado e inmune a cortes por comillas o saltos de línea intermedios en el YAML front-matter
        function parseMetadata(text) {
            const metadata = { title: "Sin título", img: "", rawDate: null };
            const matches = text.match(/^---([\s\S]*?)---/);
            if (matches) {
                const lines = matches[1].split('\n');
                let currentKey = null;
                
                lines.forEach(line => {
                    const cleanLine = line.trim();
                    if (!cleanLine) return;
                    
                    // Si contiene un separador de clave-valor limpio
                    if (cleanLine.includes(':')) {
                        const index = cleanLine.indexOf(':');
                        const key = cleanLine.substring(0, index).trim();
                        let val = cleanLine.substring(index + 1).trim();
                        
                        // Eliminar comillas envolventes si existen
                        val = val.replace(/^['"]([\s\S]*?)['"]$/g, '$1');
                        
                        if (key === 'title' || key === 'image' || key === 'date') {
                            currentKey = key;
                            if (key === 'title') metadata.title = val;
                            if (key === 'image') metadata.img = val;
                            if (key === 'date') metadata.rawDate = val;
                        } else {
                            currentKey = null;
                        }
                    } else if (currentKey === 'title') {
                        // En caso de que el título continúe en la línea siguiente en el archivo Markdown
                        let appendVal = cleanLine.replace(/^['"]|['"]$/g, '');
                        metadata.title += " " + appendVal;
                    }
                });
            }
            // Limpieza extra por si quedaron comillas rotas residuales
            metadata.title = metadata.title.replace(/^['"]|['"]$/g, '').trim();
            return metadata;
        }

        async function renderFeed() {
            const content = document.getElementById('blog-content');
            content.innerHTML = `<a onclick="goHome()" class="btn-back">← VOLVER</a><h2 style="font-family: 'Cormorant Garamond'; text-align: center;">BITÁCORA</h2><div id="feed">Cargando...</div>`;
            
            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/posts`);
                const files = await res.json();
                const feed = document.getElementById('feed');
                feed.innerHTML = "";

                let allPosts = [];

                for (let file of files) {
                    const postRes = await fetch(file.download_url);
                    const postText = await postRes.text();
                    
                    const meta = parseMetadata(postText);
                    const slug = file.name;

                    allPosts.push({ title: meta.title, img: meta.img, rawDate: meta.rawDate, slug });
                }

                allPosts.sort((a, b) => {
                    return new Date(b.rawDate || 0) - new Date(a.rawDate || 0);
                });

                for (let post of allPosts) {
                    let fechaTexto = "";
                    if (post.rawDate) {
                        const dateObj = new Date(post.rawDate);
                        fechaTexto = dateObj.toLocaleString('es-AR', {
                            day: '2-digit', month: '2-digit', year: 'numeric',
                            hour: '2-digit', minute: '2-digit'
                        });
                    }

                    feed.innerHTML += `
                        <div class="preview-card" onclick="updateUrlAndRender('${post.slug}')">
                            ${post.img ? `<img src="${post.img}" class="preview-img">` : ''}
                            ${fechaTexto ? `<span style="font-size: 0.72rem; color: var(--text-muted); display: block; margin-bottom: 6px; font-weight: 300; letter-spacing: 1px;">${fechaTexto}</span>` : ''}
                            <h3 class="note-title" style="font-size: 1.5rem !important; margin-top: 0 !important;">${post.title}</h3>
                            <p style="font-size: 0.8rem; color: var(--gold); margin-bottom: 0; margin-top: auto;">Leer nota →</p>
                        </div>
                    `;
                }
            } catch (e) { feed.innerHTML = "Error al cargar notas."; }
        }

        async function renderFullNote(slug) {
            const content = document.getElementById('blog-content');
            content.innerHTML = "Cargando nota...";
            
            try {
                const res = await fetch(`https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/posts/${slug}`);
                const postText = await res.text();
                
                const meta = parseMetadata(postText);
                const body = postText.split('---').pop().trim();

                content.innerHTML = `
                    <a onclick="openBlog()" class="btn-back">← VOLVER AL LISTADO</a>
                    <article style="width: 100%; box-sizing: border-box;">
                        ${meta.img ? `<img src="${meta.img}" class="full-note-img">` : ''}
                        <h1 class="note-title" style="font-size: 2.2rem !important;">${meta.title}</h1>
                        <div class="note-text">${body}</div>
                    </article>
                `;
            } catch (e) { content.innerHTML = "Nota no encontrada."; }
        }

        function updateUrlAndRender(slug) {
            window.history.pushState({}, '', `?post=${slug}`);
            renderFullNote(slug);
        }
    </script>
</body>
</html>
