<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alan Mekbel · Blog</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A84C; --gold-light: #E8CC84; --gold-dark: #8B6914;
            --garnet-mid: #5C1422; --black: #080808; 
            --dark: #111012; --dark-2: #18161A; --white: #F8F6F2; 
            --off-white: #EDE9E0; --text-muted: #8A8590; --border: rgba(201,168,76,0.18);
        }
        body { background-color: var(--black); color: var(--white); font-family: 'Montserrat', sans-serif; margin: 0; }
        .container { max-width: 650px; margin: 0 auto; padding: 40px 20px; min-height: 100vh; }
        .hidden { display: none !important; }
        
        /* Links */
        .link-card {
            display: block; background: var(--dark-2); border: 1px solid var(--border);
            padding: 20px; margin-bottom: 15px; text-align: center;
            text-decoration: none; color: var(--off-white); transition: 0.3s;
            cursor: pointer; letter-spacing: 2px; font-size: 0.8rem;
        }
        .link-card:hover { background: #3D0B15; border-color: var(--gold); }

        /* Preview del Feed */
        .preview-card { 
            margin-bottom: 40px; cursor: pointer; border-bottom: 1px solid var(--border); 
            padding-bottom: 20px; transition: 0.3s;
        }
        .preview-card:hover .note-title { color: var(--gold); }
        .preview-img { width: 100%; height: 200px; object-fit: cover; filter: grayscale(30%); margin-bottom: 15px; }

        /* Nota Individual */
        .full-note-img { width: 100%; height: auto; max-height: 500px; object-fit: cover; margin-bottom: 30px; border: 1px solid var(--border); }
        .note-title { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; color: var(--gold-light); margin-bottom: 10px; line-height: 1.2; }
        .note-text { font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; color: var(--off-white); line-height: 1.8; white-space: pre-wrap; }
        
        .btn-back { color: var(--gold); cursor: pointer; font-size: 0.8rem; letter-spacing: 1px; text-decoration: none; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="home">
            <h1 style="font-family: 'Cormorant Garamond'; text-align: center; font-size: 3.2rem; color: var(--gold); margin-bottom: 5px;">Alan Mekbel</h1>
            <p style="text-align: center; font-weight: 200; color: var(--text-muted); margin-bottom: 40px; letter-spacing: 3px; font-size: 0.75rem;">ARCHIVO PERSONAL & REDES</p>
            
            <div class="links-container">
                <a class="link-card" onclick="openBlog()" style="background: var(--garnet-mid); border-color: var(--gold-dark); font-weight: 600;">ENTRAR AL BLOG</a>
                <a href="https://instagram.com/agranate" target="_blank" class="link-card">INSTAGRAM</a>
                <a href="https://x.com/AlanMekbel14" target="_blank" class="link-card">X (PRINCIPAL)</a>
                <a href="https://x.com/MekbelAlan" target="_blank" class="link-card">X (GENERAL)</a>
                <a href="mailto:alanmekbeluai@gmail.com" class="link-card" style="opacity: 0.6; font-size: 0.7rem;">CONTACTO</a>
            </div>
        </div>

        <div id="blog" class="hidden">
            <div id="blog-content">
                </div>
        </div>
    </div>

    <script>
        const GITHUB_USER = "TU_USUARIO_AQUÍ"; 
        const GITHUB_REPO = "TU_REPO_AQUÍ";

        // Al cargar la página, chequear si venimos de un link de una nota
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if (params.has('post')) {
                openBlog(params.get('post'));
            }
        };

        function openBlog(slug = null) {
            document.getElementById('home').classList.add('hidden');
            document.getElementById('blog').classList.remove('hidden');
            if (slug) {
                renderFullNote(slug);
            } else {
                renderFeed();
            }
        }

        function goHome() {
            window.history.pushState({}, '', window.location.pathname);
            document.getElementById('home').classList.remove('hidden');
            document.getElementById('blog').classList.add('hidden');
        }

        async function renderFeed() {
            const content = document.getElementById('blog-content');
            content.innerHTML = `<a onclick="goHome()" class="btn-back">← VOLVER</a><h2 style="font-family: 'Cormorant Garamond'; text-align: center;">BITÁCORA</h2><div id="feed">Cargando...</div>`;
            
            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/posts`);
                const files = await res.json();
                const feed = document.getElementById('feed');
                feed.innerHTML = "";

                // Ordenar por más recientes (reverse)
                for (let file of files.reverse()) {
                    const postRes = await fetch(file.download_url);
                    const postText = await postRes.text();
                    
                    const title = postText.match(/title:\s*["']?(.*?)["']?(\r?\n|$)/)?.[1] || "Sin título";
                    const img = postText.match(/image:\s*["']?(.*?)["']?(\r?\n|$)/)?.[1] || "";
                    const slug = file.name;

                    feed.innerHTML += `
                        <div class="preview-card" onclick="updateUrlAndRender('${slug}')">
                            ${img ? `<img src="${img}" class="preview-img">` : ''}
                            <h3 class="note-title" style="font-size: 1.5rem;">${title}</h3>
                            <p style="font-size: 0.8rem; color: var(--gold);">Leer nota →</p>
                        </div>
                    `;
                }
            } catch (e) { feed.innerHTML = "Error al cargar notas."; }
        }

        async function renderFullNote(slug) {
            const content = document.getElementById('blog-content');
            content.innerHTML = "Cargando nota...";
            
            try {
                const res = await fetch(`https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/posts/${slug}`);
                const postText = await res.text();
                
                const title = postText.match(/title:\s*["']?(.*?)["']?(\r?\n|$)/)?.[1] || "Sin título";
                const img = postText.match(/image:\s*["']?(.*?)["']?(\r?\n|$)/)?.[1] || "";
                const body = postText.split('---').pop().trim();

                content.innerHTML = `
                    <a onclick="openBlog()" class="btn-back">← VOLVER AL LISTADO</a>
                    <article>
                        ${img ? `<img src="${img}" class="full-note-img">` : ''}
                        <h1 class="note-title">${title}</h1>
                        <div class="note-text">${body}</div>
                    </article>
                `;
            } catch (e) { content.innerHTML = "Nota no encontrada."; }
        }

        function updateUrlAndRender(slug) {
            window.history.pushState({}, '', `?post=${slug}`);
            renderFullNote(slug);
        }
    </script>
</body>
</html>
